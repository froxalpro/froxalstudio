<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin V1 | FroXal Studio</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .admin-fullscreen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 2rem;
      }

      .admin-box {
        background-color: rgba(30, 30, 30, 0.9);
        border: 2px solid #5a5a5a;
        border-radius: 8px;
        padding: 2rem;
        width: 100%;
        max-width: 800px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        margin-bottom: 2rem;
      }

      .admin-title {
        font-family: "Minecraft Bold", sans-serif !important;
        color: #ff9900;
        text-align: center;
        margin-bottom: 2rem;
        font-size: 2rem;
        text-transform: uppercase;
      }

      .hidden {
        display: none !important;
      }

      .status-msg {
        margin-top: 1rem;
        text-align: center;
        font-weight: bold;
        font-family: sans-serif;
      }

      .success {
        color: #50c878;
      }
      .error {
        color: #ff5555;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #ccc;
        font-family: "Minecraft", sans-serif !important;
      }

      .admin-input,
      .admin-file {
        width: 100%;
        padding: 0.8rem;
        margin-bottom: 1.5rem;
        background: #111;
        border: 1px solid #444;
        color: white;
        border-radius: 4px;
        font-family: inherit;
      }

      .admin-file {
        padding: 0.5rem;
        cursor: pointer;
      }

      .header-admin {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        border-bottom: 2px solid #333;
        padding-bottom: 1rem;
      }
      .client-list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #222;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #444;
        border-radius: 4px;
      }

      .client-list-item img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        margin-right: 15px;
        border: 1px solid #111;
      }

      .client-item-info {
        display: flex;
        align-items: center;
        flex: 1;
        font-family: "Minecraft", sans-serif;
        color: white;
      }

      .action-btns {
        display: flex;
        gap: 10px;
      }

      .btn-sm {
        padding: 0.3rem 0.8rem;
        font-size: 0.8rem;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="dynamic-bg" class="dynamic-bg" style="opacity: 0.1"></div>

    <div class="admin-fullscreen relative-container">
      <!-- SECTION CONNEXION -->
      <div id="login-section" class="admin-box">
        <h2 class="admin-title">ADMIN LOGIN</h2>
        <form id="login-form">
          <div class="form-group">
            <label>Email Administrateur</label>
            <input type="email" id="login-email" class="admin-input" required />
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input
              type="password"
              id="login-password"
              class="admin-input"
              required
            />
          </div>
          <button
            type="submit"
            class="btn-primary"
            style="
              width: 100%;
              font-family: &quot;Minecraft&quot;, sans-serif !important;
            "
          >
            Se Connecter
          </button>
        </form>
        <div id="login-status" class="status-msg error"></div>
      </div>

      <!-- SECTION DASHBOARD (AJOUT CLIENT) -->
      <div id="dashboard-section" class="admin-box hidden">
        <div class="header-admin">
          <h2 class="admin-title" style="margin: 0; font-size: 1.5rem">
            DASHBOARD
          </h2>
          <button
            id="logout-btn"
            class="btn-primary"
            style="padding: 0.5rem 1rem; font-size: 0.8rem"
          >
            Quitter
          </button>
        </div>

        <p style="text-align: center; margin-bottom: 2rem; color: #aaa">
          Ajouter une nouvelle carte client dynamique (Logo 500x500 max
          recommandé).
        </p>

        <form id="upload-form">
          <div class="form-group">
            <label>Nom du Client</label>
            <input
              type="text"
              id="client-name"
              class="admin-input"
              placeholder="Ex: Hypixel, Squeezie..."
              required
            />
          </div>
          <div class="form-group">
            <label>Logo / Image (PNG, JPG)</label>
            <input
              type="file"
              id="client-image"
              class="admin-file"
              accept="image/png, image/jpeg, image/jpg"
              required
            />
          </div>
          <button
            type="submit"
            id="submit-client-btn"
            class="btn-primary"
            style="
              width: 100%;
              font-family: &quot;Minecraft&quot;, sans-serif !important;
            "
          >
            Ajouter au Portfolio
          </button>
        </form>
        <div id="upload-status" class="status-msg"></div>

        <hr style="border-color: #444; margin: 2rem 0" />

        <h3
          style="
            color: white;
            font-family: &quot;Minecraft&quot;, sans-serif;
            margin-bottom: 1rem;
          "
        >
          Clients existants :
        </h3>
        <div id="admin-clients-list">
          <!-- La liste s'affichera ici -->
        </div>
      </div>

      <a href="index.html" class="btn-outline" style="margin-top: 2rem"
        >Retour au site</a
      >
    </div>

    <!-- MODAL ÉDITION -->
    <div id="edit-modal" class="modal-overlay">
      <div
        class="modal-content"
        style="
          max-width: 500px;
          padding: 2rem;
          background-color: rgba(30, 30, 30, 0.95);
          border: 2px solid #5a5a5a;
          border-radius: 8px;
        "
      >
        <button id="close-edit-modal" class="close-btn">&times;</button>
        <h2 class="admin-title" style="font-size: 1.5rem; margin-top: 1rem">
          ÉDITER CLIENT
        </h2>
        <form id="edit-form">
          <input type="hidden" id="edit-client-id" />
          <input type="hidden" id="edit-client-old-image" />
          <div class="form-group">
            <label>Nouveau Nom du Client</label>
            <input
              type="text"
              id="edit-client-name"
              class="admin-input"
              required
            />
          </div>
          <div class="form-group">
            <label>Nouvelle Image (optionnel)</label>
            <input
              type="file"
              id="edit-client-image"
              class="admin-file"
              accept="image/png, image/jpeg, image/jpg"
            />
            <small style="color: #aaa; text-align: left; display: block"
              >Laissez vide pour conserver l'image actuelle.</small
            >
          </div>
          <button
            type="submit"
            id="submit-edit-btn"
            class="btn-primary"
            style="
              width: 100%;
              font-family: &quot;Minecraft&quot;, sans-serif !important;
              margin-top: 1rem;
            "
          >
            Mettre à jour
          </button>
        </form>
        <div id="edit-status" class="status-msg"></div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
